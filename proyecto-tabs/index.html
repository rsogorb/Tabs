<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tabs Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tabs-container">
        <div class="tab-header">
            <button class="tab-btn active" data-target="tab1">First Tab</button>
            <button class="tab-btn" data-target="tab2">Second Tab</button>
            <button class="tab-btn" data-target="tab3">Third Tab</button>
            <button class="tab-btn" data-target="tab4">Fourth Tab</button>
        </div>
        <div class="tab-content">
            <div id="tab1" class="content active">First Tab content to be displayed here.</div>
            <div id="tab2" class="content">Second Tab content: Here is some dummy text.</div>
            <div id="tab3" class="content">Third Tab content: More info goes here.</div>
            <div id="tab4" class="content">Fourth Tab content: Final section.</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
